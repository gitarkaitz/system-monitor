name: CI

on:
  pull_request:
    branches:
      - master

jobs:
  build-and-test:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore dependencies
        run: dotnet restore SystemMonitor/SystemMonitor.sln

      - name: Build
        run: dotnet build SystemMonitor/SystemMonitor.sln --no-restore --configuration Release

      - name: Test
        run: dotnet test SystemMonitor/SystemMonitor.sln --no-build --configuration Release